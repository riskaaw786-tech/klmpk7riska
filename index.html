<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Speed Type Game</title>
    <style>
        :root {
            --bg-color: #2b2d42;
            --card-color: #1d3557;
            --text-color: #f1faee;
            --accent-color: #a8dadc;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: background-color 0.2s ease; /* Transisi flash hijau */
        }

        /* Kelas untuk efek flash hijau saat jawaban benar */
        body.correct-flash {
            background-color: #2a9d8f !important;
        }

        .container {
            text-align: center;
            background-color: var(--card-color);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
            width: 90%;
            max-width: 450px;
            color: var(--text-color);
        }

        /* Animasi Bergetar (Shake) saat salah */
        .container.shake {
            animation: shakeAnim 0.4s ease-in-out;
        }

        @keyframes shakeAnim {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }

        h1 {
            margin-top: 0;
            font-size: 2rem;
            letter-spacing: 2px;
            color: var(--accent-color);
        }

        #word-display {
            font-size: 3.5rem;
            font-weight: bold;
            margin: 30px 0;
            letter-spacing: 1px;
            word-wrap: break-word;
        }

        input[type="text"] {
            width: 80%;
            padding: 12px 20px;
            font-size: 1.2rem;
            border: 2px solid var(--accent-color);
            border-radius: 25px;
            background-color: transparent;
            color: white;
            text-align: center;
            outline: none;
            transition: all 0.3s;
        }

        input[type="text"]:focus {
            box-shadow: 0 0 10px var(--accent-color);
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 30px;
            font-size: 1.1rem;
        }

        .score-box, .hint-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 20px;
            border-radius: 15px;
        }

        #score, #hint {
            font-weight: bold;
            color: var(--accent-color);
        }
    </style>
</head>
<body>

    <div class="container" id="game-card">
        <h1>THE SPEED TYPE</h1>
        
        <!-- Kata acak yang harus diketik muncul di sini -->
        <div id="word-display">loading...</div>

        <input type="text" id="input-word" placeholder="Ketik di sini dan tekan Enter" autocomplete="off" autofocus>

        <div class="stats">
            <div class="score-box">Skor: <span id="score">0</span></div>
            <div class="hint-box"><span id="hint">Tekan Enter untuk cek</span></div>
        </div>
    </div>

    <script>
        // Daftar kata acak
        const words = [
            "javascript", "html", "css", "coding", "developer", 
            "website", "internet", "keyboard", "program", "database",
            "server", "browser", "aplikasi", "computer", "algorithm",
            "responsive", "interface", "framework", "variable", "function"
        ];

        let currentWord = "";
        let score = 0;

        const wordDisplay = document.getElementById('word-display');
        const inputWord = document.getElementById('input-word');
        const scoreDisplay = document.getElementById('score');
        const gameCard = document.getElementById('game-card');
        const body = document.body;

        // Fungsi untuk mengambil kata acak dari daftar
        function generateRandomWord() {
            const randomIndex = Math.floor(Math.random() * words.length);
            currentWord = words[randomIndex];
            wordDisplay.innerText = currentWord;
        }

        // Fungsi untuk mengecek input pengguna
        function checkWord() {
            const userWord = inputWord.value.trim().toLowerCase();

            if (userWord === currentWord) {
                // JIKA BENAR
                score++;
                scoreDisplay.innerText = score;
                inputWord.value = ""; // Kosongkan input
                
                // Efek kilatan hijau di background body
                body.classList.add('correct-flash');
                setTimeout(() => {
                    body.classList.remove('correct-flash');
                }, 200); // Hilang setelah 0.2 detik

                generateRandomWord(); // Ganti kata baru
            } else {
                // JIKA SALAH
                // Efek getar (shake) pada kotak game
                gameCard.classList.add('shake');
                inputWord.select(); // Memblok teks yang salah agar mudah dihapus
                
                setTimeout(() => {
                    gameCard.classList.remove('shake');
                }, 400); // Durasi animasi getar sesuai CSS
            }
        }

        // Event listener saat pengguna menekan tombol di keyboard
        inputWord.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                checkWord();
            }
        });

        // Memulai game pertama kali saat halaman dimuat
        generateRandomWord();
    </script>
</body>
  </html>
